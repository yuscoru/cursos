version: 2
updates:

  # ✅ Dependencias Maven (tu pom.xml)
  - package-ecosystem: "maven"
    directory: "/"
    schedule:
      interval: "weekly"       # Revisa cada semana
    open-pull-requests-limit: 5 # Máximo 5 PRs abiertos a la vez
    labels:
      - "dependencies"

  # ✅ GitHub Actions (tus workflows)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "github-actions"
